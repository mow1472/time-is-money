<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Value of Money — Core Variables</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eef1f7;
    --surface: #ffffff;
    --surface2: #f5f7fb;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1d27;
    --text2: #5a5f74;
    --text3: #8a8fa8;
    --gold: #d4900a;
    --gold-light: #fdf3df;
    --gold-border: #f0c55a;
    --key-bg: #16306b;
    --key-active: #d4900a;
    --calc-body: #9aa0ab;
    --calc-dark: #6b7280;
    --screen: #0d1117;
    --display: #c8b400;
    --radius: 12px;
    --radius-sm: 7px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem 3rem;
  }

  .page {
    width: 100%;
    max-width: 600px;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 600;
    color: #16306b;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 14px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.3px;
  }

  /* ── Calculator ── */
  .calc-shell {
    background: linear-gradient(160deg, #b2b8c2 0%, #8a9099 100%);
    border-radius: 14px;
    padding: 16px 18px 18px;
    margin-bottom: 1.75rem;
    box-shadow: 0 2px 0 #70787f, 0 4px 12px rgba(0,0,0,0.18);
    position: relative;
  }
  .calc-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .calc-brand { font-size: 12px; font-weight: 600; color: #2a2e36; letter-spacing: 0.5px; }
  .calc-sub { font-size: 10px; color: #3d4350; letter-spacing: 0.3px; }

  .calc-screen {
    background: #111620;
    border-radius: 5px;
    padding: 10px 14px;
    margin-bottom: 12px;
    border: 1px solid #060a10;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
  }
  .calc-hint {
    font-size: 10px;
    color: #3a4050;
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }
  .calc-display {
    color: var(--display);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 3px;
    text-align: right;
    text-shadow: 0 0 8px rgba(200,180,0,0.4);
    transition: all 0.2s;
  }

  .calc-keys {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 9px;
  }
  .calc-key {
    background: var(--key-bg);
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 10px 0 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.4px;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 2px 0 #0c1d40;
    position: relative;
  }
  .calc-key:hover { background: #1e428c; }
  .calc-key:active { transform: translateY(1px); box-shadow: 0 1px 0 #0c1d40; }
  .calc-key.active {
    background: var(--key-active);
    box-shadow: 0 2px 0 #8a5c00;
    color: #fff;
  }
  .calc-key.active::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 7px;
    border: 2px solid #f0c55a;
    pointer-events: none;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── Accordion ── */
  .accordion { display: flex; flex-direction: column; gap: 7px; }

  .acc-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .acc-item.open {
    border-color: var(--gold-border);
    box-shadow: 0 0 0 3px rgba(212,144,10,0.09);
  }

  .acc-btn {
    width: 100%;
    background: transparent;
    border: none;
    padding: 15px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }
  .acc-btn:hover { background: var(--surface2); }

  .acc-key-badge {
    flex-shrink: 0;
    width: 38px;
    height: 28px;
    background: var(--key-bg);
    color: #fff;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.3px;
    transition: background 0.2s;
  }
  .acc-item.open .acc-key-badge { background: var(--key-active); }

  .acc-title-text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .acc-chevron {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s, background 0.15s;
  }
  .acc-chevron svg { width: 12px; height: 12px; stroke: var(--text3); transition: stroke 0.15s; }
  .acc-item.open .acc-chevron { transform: rotate(180deg); background: var(--gold-light); }
  .acc-item.open .acc-chevron svg { stroke: var(--gold); }

  .acc-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.32s ease;
  }
  .acc-body.open { max-height: 700px; }

  .acc-inner {
    padding: 2px 16px 18px 66px;
    border-top: 1px solid var(--border);
  }

  .acc-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin: 14px 0 12px;
  }

  .acc-qs-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.5px;
    margin-bottom: 7px;
  }

  .acc-bullets { margin-bottom: 14px; }
  .acc-bullet {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13.5px;
    color: var(--text2);
    margin-bottom: 5px;
    line-height: 1.55;
  }
  .acc-bullet::before {
    content: '';
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin-top: 7px;
  }

  .acc-example {
    background: var(--gold-light);
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 11px 14px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }
  .acc-example span { font-weight: 600; color: var(--text); }

  .acc-note {
    margin-top: 11px;
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1>Time Value of Money</h1>
    <p>Core Variables</p>
  </div>

  <div class="calc-shell">
    <div class="calc-top-bar">
      <span class="calc-brand">HP 10B</span>
      <span class="calc-sub">Business Calculator</span>
    </div>
    <div class="calc-screen">
      <div class="calc-hint">Click a key or section below</div>
      <div class="calc-display" id="calc-display">0.00</div>
    </div>
    <div class="calc-keys">
      <button class="calc-key" data-key="N" id="key-N">N</button>
      <button class="calc-key" data-key="I/YR" id="key-IYR">I/YR</button>
      <button class="calc-key" data-key="PV" id="key-PV">PV</button>
      <button class="calc-key" data-key="PMT" id="key-PMT">PMT</button>
      <button class="calc-key" data-key="FV" id="key-FV">FV</button>
    </div>
  </div>

  <p class="section-label">The 5 TVM Keys</p>

  <div class="accordion" id="accordion"></div>
</div>

<script>
const items = [
  {
    key: "PV",
    keyId: "key-PV",
    label: "PV",
    title: "Present Value (PV) — Value Today",
    desc: "Present Value is the amount of money you have today or the value of future money expressed in today's dollars.",
    qsLabel: "Answers questions like:",
    bullets: [
      "How much should I invest today?",
      "What is a future payment worth today?"
    ],
    example: "If you invest $1,000 today, the $1,000 is the present value.",
    display: "-1,000.00",
    note: null
  },
  {
    key: "FV",
    keyId: "key-FV",
    label: "FV",
    title: "Future Value (FV) — Value in the Future",
    desc: "Future Value is what money today will grow to over time after earning interest.",
    qsLabel: "Answers questions like:",
    bullets: [
      "How much will my money grow to?",
      "What will my savings be worth later?"
    ],
    example: "If $1,000 grows to $1,100 in one year because of earning interest, $1,100 is the future value.",
    display: "1,100.00",
    note: null
  },
  {
    key: "I/YR",
    keyId: "key-IYR",
    label: "I/YR",
    title: "Interest Rate (r or i) — Growth Rate",
    desc: "The interest rate is the percentage that money grows each period. Expressed as a percentage (5%, 8%, etc.). Higher interest rates → faster growth of money.",
    qsLabel: null,
    bullets: [],
    example: "A bank paying 5% interest rate annually means money grows by 5% each year.",
    display: "5.00",
    note: null
  },
  {
    key: "N",
    keyId: "key-N",
    label: "N",
    title: "Number of Periods (n) — Time",
    desc: "The number of periods represents how long money grows or is invested.",
    qsLabel: null,
    bullets: [
      "Often measured in years",
      "Can also be measured in months or other time periods",
      "More time allows more growth"
    ],
    example: "Investing money for 5 years means n = 5.",
    display: "5.00",
    note: null
  },
  {
    key: "PMT",
    keyId: "key-PMT",
    label: "PMT",
    title: "Payments (PMT) — Repeated Cash Flows",
    desc: "Payments are equal amounts of money paid or received regularly over time.",
    qsLabel: "Common examples:",
    bullets: [
      "Monthly loan payments",
      "Retirement contributions",
      "Rent payments",
      "Savings deposits"
    ],
    example: "Depositing $200 each month into a savings account for 5 years to reach a savings goal.",
    display: "-200.00",
    note: null
  }
];

const accordion = document.getElementById("accordion");
let openIndex = null;

items.forEach((item, i) => {
  const el = document.createElement("div");
  el.className = "acc-item";
  el.id = "acc-" + i;

  const bulletsHTML = item.bullets.length
    ? `${item.qsLabel ? `<p class="acc-qs-label">${item.qsLabel}</p>` : ""}
       <div class="acc-bullets">${item.bullets.map(b => `<div class="acc-bullet">${b}</div>`).join("")}</div>`
    : "";

  el.innerHTML = `
    <button class="acc-btn" data-idx="${i}">
      <span class="acc-key-badge">${item.label}</span>
      <span class="acc-title-text">${item.title}</span>
      <span class="acc-chevron">
        <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="2,4 6,8 10,4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>
    <div class="acc-body" id="body-${i}">
      <div class="acc-inner">
        <p class="acc-desc">${item.desc}</p>
        ${bulletsHTML}
        <div class="acc-example"><span>Example:</span> ${item.example}</div>
        ${item.note ? `<p class="acc-note">${item.note}</p>` : ""}
      </div>
    </div>
  `;
  accordion.appendChild(el);
});

function setDisplay(val) {
  document.getElementById("calc-display").textContent = val;
}
function clearKeys() {
  document.querySelectorAll(".calc-key").forEach(k => k.classList.remove("active"));
}
function clearAccordions() {
  document.querySelectorAll(".acc-item").forEach(a => a.classList.remove("open"));
  document.querySelectorAll(".acc-body").forEach(b => b.classList.remove("open"));
}

function openItem(idx) {
  clearKeys();
  clearAccordions();
  const item = items[idx];
  const accEl = document.getElementById("acc-" + idx);
  const body = document.getElementById("body-" + idx);
  accEl.classList.add("open");
  body.classList.add("open");
  const keyEl = document.getElementById(item.keyId);
  if (keyEl) keyEl.classList.add("active");
  setDisplay(item.display);
  openIndex = idx;
}

function closeAll() {
  clearKeys();
  clearAccordions();
  setDisplay("0.00");
  openIndex = null;
}

accordion.addEventListener("click", e => {
  const btn = e.target.closest(".acc-btn");
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  if (openIndex === idx) { closeAll(); return; }
  openItem(idx);
});

document.querySelectorAll(".calc-key").forEach(btn => {
  btn.addEventListener("click", () => {
    const key = btn.dataset.key;
    const idx = items.findIndex(it => it.key === key);
    if (idx === -1) return;
    if (openIndex === idx) { closeAll(); return; }
    openItem(idx);
    setTimeout(() => {
      document.getElementById("acc-" + idx).scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 50);
  });
});
</script>
</body>
</html>
